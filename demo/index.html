<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选品类目</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="categories">
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Selection Hub</p>
          <h1>汽车选品类目导航</h1>
          <p class="hero-copy">
            先选类目，再进入商品列表页做筛选和排序。当前先提供网页结构，等你给出目标网站后再接入真实爬取数据。
          </p>
        </div>
        <div class="hero-panel">
          <span>类目数</span>
          <strong>14</strong>
        </div>
      </header>

      <main>
        <section class="section-head">
          <div>
            <p class="section-kicker">一级入口</p>
            <h2>大类目</h2>
          </div>
          <p class="section-note">点击任意类目进入商品卡片页</p>
        </section>

        <section id="categoryGrid" class="category-grid" aria-label="类目列表"></section>
      </main>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
